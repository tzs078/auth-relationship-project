{% extends 'master/base.html' %}
{% block content %}
  <h1>User Register Page</h1>
    {% include 'master/message.html' %}
  <form action="" method="POST">
    {% csrf_token %}
    <div class="mb-3">
      <label for="exampleFormControlInput1" class="form-label">Username</label>
      <input type="text" name="username" class="form-control" id="exampleFormControlInput1"  />
    </div>
    <div class="mb-3">
      <label for="exampleFormControlInput1" class="form-label">Full Name</label>
      <input type="text" name="full_name" class="form-control" id="exampleFormControlInput1"  />
    </div>
    <div class="mb-3">
      <label for="exampleFormControlInput1" class="form-label">Email address</label>
      <input type="email" name="email" class="form-control" id="exampleFormControlInput1"  />
    </div>
    <div class="mb-3">
      <label for="exampleFormControlInput1" class="form-label">Password</label>
      <input type="password" name="password" class="form-control" id="exampleFormControlInput1"  />
    </div>
    <div class="mb-3">
      <label for="exampleFormControlInput1" class="form-label">Confirm Password</label>
      <input type="password" name="conf_password" class="form-control" id="exampleFormControlInput1"  />
    </div>
    <div class="mb-3">
      <input type="submit" value="Register" class="form-control btn btn-success" id="exampleFormControlInput1"  />
    </div>

  </form>
{% endblock %}
